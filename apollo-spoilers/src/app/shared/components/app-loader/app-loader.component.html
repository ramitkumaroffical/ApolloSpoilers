@if (isLoading()) {
  <div class="loader-overlay" role="alert" aria-live="assertive" aria-label="Loading">
    <div class="loader-card">
      <div class="loader-ring-outer">
        <div class="loader-ring-inner"></div>
        <div class="loader-brand-mark" aria-hidden="true">
          <span class="gauge-mark"></span>
        </div>
      </div>
      <span class="loader-label">APOLLO SPOILERS</span>
      <span class="loader-sub">Loading<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span></span>
    </div>
  </div>
}
