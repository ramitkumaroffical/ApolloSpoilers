<div class="login-container">
  <mat-card class="auth-card">
    <mat-card-content>
      <div class="eyebrow">Driver access</div>
      <h1 class="title">Welcome back</h1>
      <p class="subtitle">Sign in to tune your build, orders and saved aero picks.</p>

      @if (error()) {
        <div class="error-message">{{ error() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password">
        </mat-form-field>

        <div class="forgot-link">
          <a routerLink="/forgot-password" class="link">Forgot password?</a>
        </div>

        <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="form.invalid">
          Sign In
        </button>
      </form>

      <p class="register-link">
        New here? <a routerLink="/register" class="link">Create an account</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>
