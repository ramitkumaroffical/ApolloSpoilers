<div class="auth-wrap">
  <mat-card class="auth-card">
    <div class="eyebrow">Build profile</div>
    <h1>Create your account</h1>
    <p class="subtitle">Create your Apollo profile and keep every performance styling detail in one place.</p>

    @if (error()) { <div class="error">{{ error() }}</div> }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="row">
        <mat-form-field appearance="outline"><mat-label>First Name</mat-label>
          <input matInput formControlName="firstName"></mat-form-field>
        <mat-form-field appearance="outline"><mat-label>Last Name</mat-label>
          <input matInput formControlName="lastName"></mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Phone</mat-label>
        <input matInput formControlName="phoneNumber">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password">
        <mat-hint>Min 8 chars, 1 uppercase, 1 digit, 1 symbol.</mat-hint>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" class="full" [disabled]="form.invalid">
        Create Account
      </button>
    </form>

    <p class="switch">Already have an account? <a routerLink="/login">Sign in</a></p>
  </mat-card>
</div>
