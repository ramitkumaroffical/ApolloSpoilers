<mat-toolbar color="primary" class="app-toolbar">
  <a routerLink="/" class="brand">
    <span class="brand-mark" aria-hidden="true"><span class="gauge-mark"></span></span>
    <span class="brand-copy">
      <span class="brand-name">APOLLO</span>
      <span class="brand-sub">SPOILERS</span>
    </span>
  </a>

  <nav class="nav-links" aria-label="Main navigation">
    <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Shop</a>
    <a mat-button routerLink="/about" routerLinkActive="active">About</a>
    <a mat-button routerLink="/contact" routerLinkActive="active">Contact</a>
    @if (auth.isAuthenticated()) {
      <a mat-button routerLink="/cart">Cart</a>
      <a mat-button routerLink="/wishlist">Wishlist</a>
      <a mat-button routerLink="/orders">Orders</a>
    }
    @if (auth.isAdmin()) {
      <a mat-button routerLink="/admin">Admin</a>
    }
  </nav>

  <span class="spacer"></span>

  @if (auth.isAuthenticated()) {
    <button mat-icon-button routerLink="/cart" aria-label="Shopping cart">
      <span class="cart-mark" matBadge="{{ cart.itemCount() }}" matBadgeColor="warn" [matBadgeHidden]="cart.itemCount() === 0" aria-hidden="true"></span>
    </button>
  }

  @if (auth.isAuthenticated()) {
    <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="Account menu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <div class="menu-header">{{ auth.currentUser()?.email }}</div>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  } @else {
    <a mat-button routerLink="/login">Login</a>
    <a mat-raised-button color="accent" routerLink="/register">Sign Up</a>
  }
</mat-toolbar>

<main class="app-content" role="main">
  <router-outlet />
</main>

<app-footer />

<app-aasRa-chat />

<app-loader />
