<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdf3e7"/>
      <stop offset="100%" stop-color="#f3d9bd"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3d1f"/>
      <stop offset="100%" stop-color="#9f1d12"/>
    </linearGradient>
    <linearGradient id="helmet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffb020"/>
      <stop offset="100%" stop-color="#e08410"/>
    </linearGradient>
    <linearGradient id="visor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#080a0d"/>
    </linearGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9b0"/>
      <stop offset="100%" stop-color="#ffb020"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3d1f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff3d1f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Aura backdrop -->
  <rect width="512" height="512" fill="url(#aura)"/>

  <!-- Twin pigtails (hair buns with bolts) -->
  <g>
    <circle cx="118" cy="250" r="56" fill="url(#hair)"/>
    <circle cx="118" cy="250" r="56" fill="none" stroke="#7a160c" stroke-width="3" opacity="0.6"/>
    <circle cx="118" cy="250" r="12" fill="#ffb020"/>
    <rect x="112" y="226" width="12" height="6" rx="2" fill="#ffb020"/>
    <rect x="112" y="274" width="12" height="6" rx="2" fill="#ffb020"/>

    <circle cx="394" cy="250" r="56" fill="url(#hair)"/>
    <circle cx="394" cy="250" r="56" fill="none" stroke="#7a160c" stroke-width="3" opacity="0.6"/>
    <circle cx="394" cy="250" r="12" fill="#ffb020"/>
    <rect x="388" y="226" width="12" height="6" rx="2" fill="#ffb020"/>
    <rect x="388" y="274" width="12" height="6" rx="2" fill="#ffb020"/>
  </g>

  <!-- Hair fringe on top -->
  <path d="M 168 150 Q 256 110 344 150 Q 360 168 350 188
           L 300 172 Q 256 200 212 172 L 162 188 Q 152 168 168 150 Z"
        fill="url(#hair)"/>

  <!-- Face -->
  <ellipse cx="256" cy="256" rx="96" ry="104" fill="url(#face)"/>

  <!-- Side-bangs framing the face -->
  <path d="M 162 200 Q 150 256 168 320 L 196 300 Q 184 256 192 212 Z" fill="url(#hair)"/>
  <path d="M 350 200 Q 362 256 344 320 L 316 300 Q 328 256 320 212 Z" fill="url(#hair)"/>

  <!-- Visor band across eyes (robot eye shield) -->
  <rect x="150" y="234" width="212" height="44" rx="22" fill="url(#visor)"/>
  <rect x="150" y="234" width="212" height="44" rx="22" fill="none" stroke="#ffb020" stroke-width="2" opacity="0.55"/>

  <!-- Glowing eyes -->
  <circle cx="214" cy="256" r="13" fill="url(#eye-glow)"/>
  <circle cx="298" cy="256" r="13" fill="url(#eye-glow)"/>
  <circle cx="214" cy="256" r="5" fill="#fffbe8"/>
  <circle cx="298" cy="256" r="5" fill="#fffbe8"/>

  <!-- Blush cheeks -->
  <ellipse cx="196" cy="296" rx="14" ry="8" fill="#ff8a6a" opacity="0.5"/>
  <ellipse cx="316" cy="296" rx="14" ry="8" fill="#ff8a6a" opacity="0.5"/>

  <!-- Smile -->
  <path d="M 232 318 Q 256 338 280 318" fill="none" stroke="#7a3b25" stroke-width="5" stroke-linecap="round"/>

  <!-- Antenna with bolt tip -->
  <line x1="256" y1="128" x2="256" y2="96" stroke="#c9a35a" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="92" r="12" fill="url(#helmet)"/>
  <circle cx="256" cy="92" r="12" fill="none" stroke="#b07a08" stroke-width="2"/>
  <path d="M 250 92 L 256 86 L 262 92 L 256 98 Z" fill="#fff3d4" opacity="0.85"/>

  <!-- Headset ear cuffs -->
  <rect x="142" y="250" width="16" height="34" rx="8" fill="url(#helmet)"/>
  <rect x="354" y="250" width="16" height="34" rx="8" fill="url(#helmet)"/>

  <!-- Neck collar / tech detail -->
  <rect x="232" y="350" width="48" height="22" rx="6" fill="url(#face)"/>
  <path d="M 196 372 Q 256 392 316 372 L 326 412 Q 256 436 186 412 Z" fill="url(#helmet)"/>
  <circle cx="256" cy="392" r="7" fill="#ff3d1f"/>
</svg>
